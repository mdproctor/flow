# HTTP configuration
quarkus.http.port=8080

# Index casehub dependencies for CDI discovery
quarkus.index-dependency.scheduler-quartz.group-id=io.casehub
quarkus.index-dependency.scheduler-quartz.artifact-id=casehub-engine-scheduler-quartz
quarkus.index-dependency.persistence-hibernate.group-id=io.casehub
quarkus.index-dependency.persistence-hibernate.artifact-id=casehub-engine-persistence-hibernate

# Production datasource configuration will be set via %prod profile or env variables
quarkus.datasource.db-kind=postgresql

# Flyway migrations for production
quarkus.flyway.migrate-at-start=true
quarkus.flyway.out-of-order=true

# Quartz configuration
quarkus.quartz.store-type=jdbc-cmt
quarkus.quartz.clustered=false

# Worker execution timeout
casehub.engine.worker.default-timeout-ms=30000

# Hibernate ORM: use dedicated JSON mapper, not the REST ObjectMapper customizer
quarkus.hibernate-orm.mapping.format.global=ignore

# ============================================================================
# Production profile: PostgreSQL with env variables
# ============================================================================
%prod.quarkus.datasource.username=${DB_USERNAME:casehub}
%prod.quarkus.datasource.password=${DB_PASSWORD:changeme}
%prod.quarkus.datasource.reactive.url=postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:casehub}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:casehub}

# ============================================================================
# Dev profile: PostgreSQL with dev services (testcontainers)
# ============================================================================
%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.hibernate-orm.log.sql=true
%dev.quarkus.flyway.migrate-at-start=false
%dev.quarkus.quartz.store-type=ram

# ============================================================================
# Test profile: PostgreSQL with testcontainers (devservices)
# ============================================================================
%test.quarkus.datasource.db-kind=postgresql
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.devservices.reuse=false
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.log.sql=false
%test.quarkus.http.test-port=8081
%test.quarkus.flyway.migrate-at-start=false
%test.quarkus.quartz.store-type=ram
%test.casehub.engine.worker.default-timeout-ms=2000