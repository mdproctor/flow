name: Rerun Tests

on:
  issue_comment:
    types: [created]

permissions:
  actions: write
  pull-requests: write

jobs:
  retest:
    name: Rerun PR Tests
    # Only run on PR comments containing /retest
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/retest')
    runs-on: ubuntu-latest

    steps:
      - name: React to comment with eyes
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Get PR details and latest workflow run
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get PR head SHA
          PR_DATA=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefOid)
          HEAD_SHA=$(echo "$PR_DATA" | jq -r '.headRefOid')
          echo "head_sha=$HEAD_SHA" >> $GITHUB_OUTPUT

          # Get latest Maven CI workflow run for this PR
          RUN_ID=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow=maven.yml \
            --json databaseId,headSha,status \
            --jq "[.[] | select(.headSha == \"$HEAD_SHA\")] | .[0].databaseId")

          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Rerun workflow
        id: rerun
        if: steps.pr.outputs.run_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Rerun the workflow
          if gh run rerun ${{ steps.pr.outputs.run_id }} --repo ${{ github.repository }}; then
            echo "rerun_status=success" >> $GITHUB_OUTPUT
          else
            echo "rerun_status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: React with success
        if: steps.rerun.outputs.rerun_status == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            // Remove eyes reaction
            const reactions = await github.rest.reactions.listForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id
            });
            const eyesReaction = reactions.data.find(r =>
              r.content === 'eyes' && r.user.login === 'github-actions[bot]'
            );
            if (eyesReaction) {
              await github.rest.reactions.deleteForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                reaction_id: eyesReaction.id
              });
            }

            // Add success reaction
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

            // Post success comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ Tests restarted — check the [Actions tab](https://github.com/${{ github.repository }}/actions/runs/${{ steps.pr.outputs.run_id }})'
            });

      - name: React with failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            // Remove eyes reaction
            const reactions = await github.rest.reactions.listForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id
            });
            const eyesReaction = reactions.data.find(r =>
              r.content === 'eyes' && r.user.login === 'github-actions[bot]'
            );
            if (eyesReaction) {
              await github.rest.reactions.deleteForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                reaction_id: eyesReaction.id
              });
            }

            // Add failure reaction
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'confused'
            });

            // Post failure comment
            const runId = '${{ steps.pr.outputs.run_id }}';
            const message = runId
              ? '❌ Failed to restart tests. The workflow run may have already been rerun or deleted.'
              : '❌ No workflow run found for this PR. Tests may not have run yet — push a commit to trigger them.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });
